name: Renovate

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly on Sunday at 4:00 AM
  workflow_dispatch:  # Allow manual trigger

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        run: npx --yes renovate homelab/infra
        env:
          LOG_LEVEL: info
          RENOVATE_PLATFORM: gitea
          RENOVATE_ENDPOINT: ${{ secrets.FORGEJO_URL }}/api/v1
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_GIT_URL: endpoint
          RENOVATE_GIT_AUTHOR: 'Renovate Bot <renovate-bot@homelab.local>'
